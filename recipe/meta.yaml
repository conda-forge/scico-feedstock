{% set name = "scico" %}
{% set version = "0.0.7" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/scico-{{ version }}.tar.gz
  sha256: 8521802a75b423c4f6e20207ed17c16b1e061c17f3393fb6b140bbbd18287d1d

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}
    - typing_extensions
    - numpy >=1.20.0
    - scipy >=1.6.0
    - imageio >=2.17
    - tifffile
    - matplotlib-base
    - jaxlib >=0.4.20,<=0.4.35
    - jax >=0.4.20,<=0.4.35
    - flax >=0.8.0,<=0.10.0
    - orbax-checkpoint >=0.5.0
    - pyabel >=0.9.0
    - xdesign >=0.5.5
    - astra-toolbox
    - svmbir >=0.3.3
    - ray-dashboard >=2.5.0
    - ray-train >=2.5.0
    - ray-tune >=2.5.0
    - hyperopt

test:
  imports:
    - scico
    - scico.data
    - scico.flax
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/lanl/scico
  summary: 'Scientific Computational Imaging COde: A Python package for scientific imaging problems'
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - bwohlberg
